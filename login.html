<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | RWA Marketing Epi</title>

  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body{
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#f5f7fb;
    }

    .login-box{
      background:white;
      padding:25px;
      width:300px;
      border-radius:15px;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }

    .login-box h2{
      text-align:center;
      margin-bottom:15px;
      color:#10b981;
    }

    input{
      width:100%;
      padding:10px;
      margin:8px 0;
      border:1px solid #ddd;
      border-radius:10px;
      outline:none;
    }

    button{
      width:100%;
      padding:10px;
      border:none;
      border-radius:10px;
      background:linear-gradient(135deg, #10b981, #3b82f6);
      color:white;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
    }

    .switch{
      text-align:center;
      margin-top:10px;
      font-size:12px;
    }

    .switch a{
      color:#10b981;
      text-decoration:none;
    }
  </style>

</head>

<body>

  <div class="login-box">

    <h2>Login</h2>

    <input type="text" id="emailOrPhone" placeholder="Email or Phone Number">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="switch">
      Don't have account?
      <a href="register.html">Register</a>
    </div>

  </div>

  <script src="js/auth.js"></script>

</body>
</html>
